<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Join the Channel — Telegram</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800&family=Manrope:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --tg-blue-1:#2AABEE;
    --tg-blue-2:#229ED9;
    --anim-purple:#8E54E9;
    --bg-top:#EAF6FF;
    --bg-bottom:#FDFEFF;
    --ink:#17212B;
    --ink-soft:#6B7A8A;
    --card:#FFFFFF;
    --ring-shadow: 0 10px 40px rgba(34,158,217,0.25);
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    min-height:100vh;
    display:flex;
    align-items:center;
    justify-content:center;
    background:radial-gradient(circle at 50% -10%, var(--bg-top), var(--bg-bottom) 60%);
    font-family:'Manrope', sans-serif;
    color:var(--ink);
    padding:24px;
    overflow-x:hidden;
  }

  .spark{
    position:fixed;
    border-radius:50%;
    background:linear-gradient(135deg,var(--tg-blue-1),var(--anim-purple));
    opacity:0.15;
    filter:blur(1px);
    animation:float 9s ease-in-out infinite;
  }
  @keyframes float{
    0%,100%{ transform:translateY(0) translateX(0); }
    50%{ transform:translateY(-24px) translateX(12px); }
  }
  @media (prefers-reduced-motion: reduce){
    .spark, .ring, .badge{ animation:none !important; }
  }

  .card{
    position:relative;
    width:100%;
    max-width:400px;
    background:var(--card);
    border-radius:28px;
    padding:32px 32px 32px;
    text-align:center;
    box-shadow:0 20px 60px rgba(23,33,43,0.10), 0 2px 8px rgba(23,33,43,0.06);
  }

  .wordmark{
    display:flex;
    align-items:center;
    justify-content:center;
    gap:6px;
    margin-bottom:22px;
    color:var(--ink-soft);
    font-size:12.5px;
    font-weight:600;
    letter-spacing:0.02em;
    text-transform:uppercase;
  }
  .wordmark svg{ width:16px; height:16px; }

  .avatar-wrap{
    position:relative;
    width:112px;
    height:112px;
    margin:0 auto 20px;
  }
  .ring{
    position:absolute;
    inset:0;
    border-radius:50%;
    background:conic-gradient(from 0deg, var(--tg-blue-1), var(--anim-purple), var(--tg-blue-1));
    animation:spin 6s linear infinite;
    padding:4px;
  }
  @keyframes spin{ to{ transform:rotate(360deg); } }
  .avatar{
    position:absolute;
    inset:4px;
    border-radius:50%;
    background:linear-gradient(135deg,var(--tg-blue-2),var(--anim-purple));
    display:flex;
    align-items:center;
    justify-content:center;
    box-shadow:var(--ring-shadow);
    overflow:hidden;
  }
  .avatar svg{ width:44px; height:44px; }
  .avatar svg.hidden{ display:none; }
  .avatar img{
    width:100%;
    height:100%;
    object-fit:cover;
    border-radius:50%;
    display:none;
  }
  .avatar img.loaded{ display:block; }
  .badge{
    position:absolute;
    bottom:2px;
    right:2px;
    width:30px;
    height:30px;
    border-radius:50%;
    background:#fff;
    display:flex;
    align-items:center;
    justify-content:center;
    box-shadow:0 2px 8px rgba(0,0,0,0.15);
    animation:pulse 2.2s ease-in-out infinite;
  }
  @keyframes pulse{ 0%,100%{transform:scale(1);} 50%{transform:scale(1.12);} }
  .badge svg{ width:15px; height:15px; }

  h1{
    font-family:'Outfit', sans-serif;
    font-weight:800;
    font-size:24px;
    letter-spacing:-0.02em;
    margin:0 0 6px;
  }
  .handle{
    color:var(--tg-blue-2);
    font-size:14px;
    font-weight:600;
    margin:0 0 14px;
  }
  p.desc{
    color:var(--ink-soft);
    font-size:15px;
    line-height:1.5;
    margin:0 0 24px;
  }

  .stats{
    display:flex;
    justify-content:center;
    gap:22px;
    margin:0 0 26px;
    padding:16px 0;
    border-top:1px solid #EEF3F7;
    border-bottom:1px solid #EEF3F7;
  }
  .stat{ text-align:center; }
  .stat .num{
    font-family:'Outfit', sans-serif;
    font-weight:700;
    font-size:19px;
    color:var(--ink);
  }
  .stat .label{
    font-size:11.5px;
    color:var(--ink-soft);
    text-transform:uppercase;
    letter-spacing:0.04em;
    margin-top:2px;
  }

  .cta{
    display:flex;
    align-items:center;
    justify-content:center;
    gap:8px;
    width:100%;
    padding:15px;
    border:none;
    border-radius:14px;
    background:linear-gradient(135deg,var(--tg-blue-1),var(--tg-blue-2));
    color:#fff;
    font-family:'Outfit', sans-serif;
    font-weight:700;
    font-size:16px;
    cursor:pointer;
    box-shadow:0 8px 24px rgba(34,158,217,0.35);
    transition:transform .15s ease, box-shadow .15s ease;
    text-decoration:none;
  }
  .cta:hover{ transform:translateY(-2px); box-shadow:0 12px 28px rgba(34,158,217,0.45); }
  .cta:focus-visible{ outline:3px solid var(--anim-purple); outline-offset:2px; }
  .cta svg{ width:19px; height:19px; }

  .redirect-note{
    margin-top:14px;
    font-size:13px;
    color:var(--ink-soft);
  }
  .redirect-note b{ color:var(--tg-blue-2); }

  .footer-tag{
    margin-top:22px;
    font-size:11.5px;
    color:#B8C4CE;
    letter-spacing:0.03em;
  }
</style>
</head>
<body>

<div class="card">
  <div class="wordmark">
    <svg viewBox="0 0 240 240" fill="none"><circle cx="120" cy="120" r="120" fill="#229ED9"/><path d="M100 143l50.5 37.3c5.8 3.2 10 1.6 11.4-5.3l20.7-97.6c2-8.5-3.2-12.4-8.8-9.8L46 88.9c-8.3 3.2-8.2 7.7-1.5 9.7l32 10 74-46.7c3.5-2.3 6.7-1 4 1.3" fill="white"/></svg>
    Telegram
  </div>
  <div class="avatar-wrap">
    <div class="ring">
      <div class="avatar">
        <svg id="avatarIcon" viewBox="0 0 24 24" fill="none"><path d="M8 5v14l11-7-11-7z" fill="white"/></svg>
        <img id="avatarImg" alt="">
      </div>
    </div>
    <div class="badge">
      <svg viewBox="0 0 240 240" fill="none"><circle cx="120" cy="120" r="120" fill="#37AEE2"/><path d="M98 175c-4 0-3.4-1.5-4.8-5.4L82 132.2 170 80" fill="#C8DAEA"/><path d="M98 175c3 0 4.4-1.4 6.2-3.1l16.9-16.4-21-12.7" fill="#A9C9DD"/><path d="M100 143l50.5 37.3c5.8 3.2 10 1.6 11.4-5.3l20.7-97.6c2-8.5-3.2-12.4-8.8-9.8L46 88.9c-8.3 3.2-8.2 7.7-1.5 9.7l32 10 74-46.7c3.5-2.3 6.7-1 4 1.3" fill="white"/></svg>
    </div>
  </div>

  <h1 id="channelName">Animated Vault</h1>
  <p class="handle" id="channelHandle">Loading…</p>
  <p class="desc" id="channelDesc">Loading channel info…</p>

  <div class="stats">
    <div class="stat">
      <div class="num" id="subCount">—</div>
      <div class="label">Subscribers</div>
    </div>
    <div class="stat">
      <div class="num" id="visitCount">—</div>
      <div class="label">Visits</div>
    </div>
    <div class="stat">
      <div class="num" id="clickCount">—</div>
      <div class="label">Joined</div>
    </div>
  </div>

  <a href="#" class="cta" id="ctaBtn">
    <svg viewBox="0 0 240 240" fill="none"><circle cx="120" cy="120" r="120" fill="white" opacity="0.15"/><path d="M100 143l50.5 37.3c5.8 3.2 10 1.6 11.4-5.3l20.7-97.6c2-8.5-3.2-12.4-8.8-9.8L46 88.9c-8.3 3.2-8.2 7.7-1.5 9.7l32 10 74-46.7c3.5-2.3 6.7-1 4 1.3" fill="white"/></svg>
    <span id="ctaLabel">View in Telegram</span>
  </a>

  <p class="redirect-note">Opening automatically in <b id="countdown">5</b>s — or tap above</p>

  <p class="footer-tag">t.me/+AKgxjuvgapQ5NTZl</p>
</div>

<script>
  // ── EDIT THESE ────────────────────────────────────────
  const TELEGRAM_LINK = "https://t.me/+AKgxjuvgapQ5NTZl";
  const CHANNEL_NAME_FALLBACK = "Animated Vault";
  const CHANNEL_DESC_FALLBACK = "Full animated shorts and behind-the-scenes cuts — the versions you won't find on Instagram. New drops every week.";
  const REDIRECT_SECONDS = 5;
  // ──────────────────────────────────────────────────────

  document.getElementById('ctaBtn').href = TELEGRAM_LINK;

  // floating ambient specks
  for(let i=0;i<10;i++){
    const s=document.createElement('div');
    s.className='spark';
    const size=6+Math.random()*14;
    s.style.width=size+'px';
    s.style.height=size+'px';
    s.style.left=Math.random()*100+'vw';
    s.style.top=Math.random()*100+'vh';
    s.style.animationDelay=(Math.random()*4)+'s';
    s.style.animationDuration=(7+Math.random()*6)+'s';
    document.body.appendChild(s);
  }

  // ── Real channel info via our own Netlify Function (Telegram Bot API) ──
  async function loadChannelInfo(){
    try{
      const res = await fetch('/.netlify/functions/channel-info');
      const data = await res.json();
      if(data.error) throw new Error(data.error);

      document.getElementById('channelName').textContent = data.name || CHANNEL_NAME_FALLBACK;
      document.getElementById('channelDesc').textContent = data.description || CHANNEL_DESC_FALLBACK;
      document.getElementById('channelHandle').textContent = 'Channel';
      document.getElementById('subCount').textContent = data.memberCount != null ? data.memberCount : '—';

      // try to load the real photo
      const img = document.getElementById('avatarImg');
      img.onload = () => {
        img.classList.add('loaded');
        document.getElementById('avatarIcon').classList.add('hidden');
      };
      img.onerror = () => { /* keep fallback icon */ };
      img.src = '/.netlify/functions/channel-photo?_=' + Date.now();
    }catch(e){
      document.getElementById('channelName').textContent = CHANNEL_NAME_FALLBACK;
      document.getElementById('channelDesc').textContent = CHANNEL_DESC_FALLBACK;
      document.getElementById('channelHandle').textContent = '';
      document.getElementById('subCount').textContent = '—';
    }
  }
  loadChannelInfo();

  // ── Real counters via our own Netlify Function + Netlify Blobs ──
  async function hitCounter(type){
    try{
      const res = await fetch(`/.netlify/functions/counter?hit=${type}`);
      const data = await res.json();
      if(typeof data.visits === 'number') document.getElementById('visitCount').textContent = data.visits;
      if(typeof data.clicks === 'number') document.getElementById('clickCount').textContent = data.clicks;
      return data;
    }catch(e){ return null; }
  }

  let clicked = false;

  hitCounter('visit'); // count this page load

  async function registerClickAndGo(){
    if(clicked) return;
    clicked = true;
    hitCounter('click'); // fire and forget
    window.location.href = TELEGRAM_LINK;
  }

  document.getElementById('ctaBtn').addEventListener('click', function(e){
    e.preventDefault();
    registerClickAndGo();
  });

  // countdown + auto-redirect
  let remaining = REDIRECT_SECONDS;
  document.getElementById('countdown').textContent = remaining;
  const timer = setInterval(() => {
    remaining -= 1;
    if(remaining <= 0){
      clearInterval(timer);
      registerClickAndGo();
    } else {
      document.getElementById('countdown').textContent = remaining;
    }
  }, 1000);
</script>

</body>
</html>
